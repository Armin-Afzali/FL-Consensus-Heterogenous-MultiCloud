seed: 42

# Federation settings — models a multi-cloud deployment
num_clients: 20             # number of cloud nodes across regions/providers
clients_per_round: 10       # nodes selected per communication round
num_rounds: 50            # 50 rounds is sufficient for convergence comparison

# Local training
local_epochs: 3           # 3 epochs balances convergence vs speed
local_lr: 0.01
batch_size: 64            # larger batch = fewer steps per epoch

# Data heterogeneity (Dirichlet alpha) — models regional data distribution differences
# High values (100.0) = IID (all regions same), Low values (0.1) = extreme regional bias
dirichlet_alpha: 0.5

# Dataset
dataset: "cifar10"  # "cifar10" or "mnist"

# Model
model: "simplecnn"  # "simplecnn"

# Aggregation method: "fedavg", "trimmed_mean", "krum", "twac"
aggregator: "twac"

# TWAC hyperparameters
twac:
  trust_momentum: 0.7       # gamma: trust EMA momentum
  magnitude_sensitivity: 2.0 # alpha: norm outlier sensitivity
  magnitude_tolerance: 2.0   # beta: multiples of median before penalty
  reference_momentum: 0.9    # mu: reference direction EMA
  trust_floor: 0.1           # tau_min: minimum trust score
  straggler_decay: 0.98      # delta: trust decay for stragglers

# Trimmed Mean parameters
trimmed_mean:
  trim_ratio: 0.2  # fraction to trim from each side

# Krum parameters
krum:
  num_select: 5  # number of updates to select (multi-Krum)

# Attack configuration — models compromised or faulty cloud nodes
attack:
  type: "none"         # "none", "noise" (faulty), "sign_flip" (adversarial), "scaling"
  fraction: 0.0        # fraction of nodes that are compromised
  noise_std: 0.5       # std for Gaussian noise (models buggy training pipeline)
  flip_scale: 1.0      # scale for sign-flip (models actively malicious node)
  scaling_factor: 5.0  # factor for scaling (models node trying to dominate)

# Network heterogeneity — models inter-region, cross-provider communication
network:
  enabled: true
  base_latency: 0.0        # base inter-region latency (for simulation logging)
  latency_variance: 0.0    # variance in latency (cross-continent vs intra-region)
  drop_rate: 0.0           # probability of node becoming unreachable
  straggler_fraction: 0.0  # fraction of slow nodes (weak instances or distant regions)
  straggler_slowdown: 3.0  # how much slower stragglers are
  timeout_rounds: 1.5      # timeout = timeout_rounds * median expected time

# Computational heterogeneity — models different cloud instance types
compute:
  enabled: true
  # Relative compute speeds (1.0 = GPU instance, 0.3 = small CPU instance)
  speed_distribution: "uniform"  # "uniform", "bimodal"
  min_speed: 0.3
  max_speed: 1.0

# Logging
log_interval: 5  # evaluate every N rounds (increase for faster runs)
verbose: true
save_trust_scores: true
